    <!-- Preload WhatsApp icon so background + icon are ready together on first render -->
    <link rel="preload" as="image" href="/icons/whatsapp.svg" type="image/svg+xml" />
    <!--
      Pre-warm the connection to Smartsupp's CDN *before* the snippet runs.
      preconnect opens the DNS + TCP + TLS pipeline during HTML parsing so that
      when the snippet injects <script async src="loader.js">, the pipe is
      already warm — removes 0.5–1.5 s of cold-connection overhead on first load.
      dns-prefetch is the fallback for browsers that don't support preconnect.
    -->
    <link rel="preconnect" href="https://www.smartsuppchat.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.smartsuppchat.com" />
    <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
