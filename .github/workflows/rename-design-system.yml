name: Temporary - Rename Design System

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Rename folders
        shell: bash
        run: |
          set -e

          # Rename design-systems -> design-system
          if [ -d "design-systems" ]; then
            mv "design-systems" "design-system"
          fi

          # Rename Figma folder
          OLD="design-system/agents/figma/Figma Design System For Banking Ecosystem v0.1.0"
          NEW="design-system/agents/figma/figma-banking-design-system-v0.1.0"

          if [ -d "$OLD" ]; then
            mv "$OLD" "$NEW"
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "chore: standardize design system directory names"

      - name: Push changes
        run: git push
